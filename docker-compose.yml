services:

  mongodb:
    image: mongo:6.0.6
    container_name: 'mongo'
    restart: always
    ports:
      - 27017:27017
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - backend_services

  order-service:
    image: ansid0cker/bbuy-final-order-service:latest
    container_name: 'order-service'
    restart: always
    ports:
      - 3000:3000
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://order-service:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    environment:
      - ORDER_TARGET_URL=http://makeline-service:3001/order
      - ORDER_TARGET_TIMEOUT_MS=5000
      - ORDER_TARGET_MAX_RETRIES=2
      - ORDER_TARGET_RETRY_BASE_MS=200
    networks:
      - backend_services
    depends_on:
      makeline-service:
        condition: service_healthy

  makeline-service:
    image: ansid0cker/bbuy-final-makeline-service:latest
    container_name: 'makeline-service'
    restart: always
    ports:
      - 3001:3001
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://makeline-service:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    environment:
      - ORDER_DB_URI=mongodb://mongodb:27017
      - ORDER_DB_NAME=orderdb
      - ORDER_DB_COLLECTION_NAME=orders
    networks:
      - backend_services
    depends_on:
      mongodb:
        condition: service_healthy

  product-service:
    image: ansid0cker/bbuy-final-product-service:latest
    container_name: 'product-service'
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://product-service:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: product_service
      MONGODB_COLLECTION: products
    ports:
      - "3002:3002"
    networks:
      - backend_services

  virtual-customer:
    image: ramymohamed/virtual-customer-l8:latest
    container_name: 'virtual-customer'
    restart: always
    environment:
      - ORDER_SERVICE_URL=http://order-service:3000/
      - ORDERS_PER_HOUR=3600
    networks:
      - backend_services
    depends_on:
      order-service:
        condition: service_healthy

  store-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 'store-admin'
    restart: always
    ports:
      - 8081:8081
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://store-admin:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    environment:
      - VUE_APP_PRODUCT_SERVICE_URL=http://product-service:3002/
      - VUE_APP_MAKELINE_SERVICE_URL=http://makeline-service:3001/
      - APP_VERSION=0.1.0
    networks:
      - backend_services
    depends_on:
      product-service:
        condition: service_healthy
      makeline-service:
        condition: service_healthy

networks:
  backend_services:
    driver: bridge